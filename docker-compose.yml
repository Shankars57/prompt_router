services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-prompt-router
    environment:
      PORT: "3000"
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-flash}
      GEMINI_API_KEY_FILE: /run/secrets/gemini_api_key
    secrets:
      - gemini_api_key
    ports:
      - "3000:3000"
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

secrets:
  gemini_api_key:
    file: ./.secrets/gemini_api_key
